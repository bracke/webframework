<section class="panel counter-panel" aria-labelledby="counter-heading">
  <h2 id="counter-heading">Counter</h2>
  <div class="counter-row">
    <strong id="counter-value" class="counter-value">{{counter}}</strong>
    <button id="counter-inc" type="button" data-wf-click="counter.increment">Increment</button>
  </div>
</section>
